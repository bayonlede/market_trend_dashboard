<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>QuantEdge — Stock Market Intelligence</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#0B0E14; --panel:#111620; --border:#1E2433; --muted:#2A3249;
  --text:#E8EBF0; --sub:#8899BB; --accent:#00D4FF; --a2:#7B61FF;
  --up:#00E5A0; --dn:#FF4D6A; --warn:#F5A623;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;overflow:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--muted);border-radius:2px}
button{font-family:'Inter',sans-serif;cursor:pointer;background:none;border:none;color:inherit}
input,select{font-family:'Inter',sans-serif}

/* ── Ticker tape ── */
.tape{background:#070A10;border-bottom:1px solid var(--border);height:28px;display:flex;align-items:center;flex-shrink:0;overflow:hidden}
.tape-badge{padding:0 12px;border-right:1px solid var(--border);font-size:10px;color:var(--accent);display:flex;align-items:center;gap:6px;height:100%;flex-shrink:0;font-family:'DM Mono',monospace;letter-spacing:.5px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--up);animation:pulse 1.5s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tape-scroll{overflow:hidden;flex:1}
.tape-inner{display:flex;gap:28px;white-space:nowrap;animation:scroll 44s linear infinite;width:max-content}
.tape-inner:hover{animation-play-state:paused}
@keyframes scroll{to{transform:translateX(-50%)}}
.tape-item{display:inline-flex;gap:6px;font-size:10.5px;font-family:'DM Mono',monospace;align-items:center}

/* ── Index bar ── */
.ibar{background:#090C13;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:20px;padding:4px 16px;flex-shrink:0;overflow-x:auto}
.ibar::-webkit-scrollbar{height:0}
.idx{display:flex;align-items:center;gap:6px;flex-shrink:0}
.idx-l{font-size:9.5px;color:var(--sub);text-transform:uppercase;letter-spacing:.6px}
.idx-v{font-size:12px;font-family:'DM Mono',monospace;font-weight:500}
.idx-c{font-size:10.5px;font-family:'DM Mono',monospace}
.regime-pill{margin-left:auto;display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:3px 10px;flex-shrink:0}
.regime-pill span{font-size:10px;color:var(--sub)}
.regime-pill b{font-size:10px;color:var(--accent);font-weight:600}

/* ── Shell ── */
.shell{display:flex;height:calc(100vh - 54px)}

/* ── Sidebar ── */
.sb{width:200px;background:#080B11;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .22s ease}
.sb.col{width:50px}
.sb-logo{display:flex;align-items:center;gap:9px;padding:13px 11px;border-bottom:1px solid var(--border);overflow:hidden}
.sb-icon{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--a2));display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.sb-name{font-size:14px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
nav{flex:1;padding:8px 6px;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 8px;border-radius:8px;font-size:12.5px;color:var(--sub);cursor:pointer;transition:all .13s;white-space:nowrap;overflow:hidden;border:1px solid transparent}
.nav-item:hover{color:var(--text);background:#131C2C}
.nav-item.active{color:var(--accent);background:#0B1929;border-color:#1A3355}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-toggle{padding:10px;border-top:1px solid var(--border);display:flex;justify-content:center}
.sb-toggle button{color:var(--sub);font-size:16px;padding:4px 10px;border-radius:6px;transition:all .13s}
.sb-toggle button:hover{color:var(--text);background:#131C2C}

/* ── Main ── */
main{flex:1;overflow-y:auto;padding:18px 20px;background:var(--bg)}

/* ── Page header ── */
.ph{margin-bottom:16px}
.ph h1{font-size:18px;font-weight:600}
.ph p{font-size:11.5px;color:var(--sub);margin-top:2px}

/* ── Stat cards ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:13px 15px;transition:all .18s;cursor:default}
.stat-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.stat-label{font-size:9.5px;text-transform:uppercase;letter-spacing:1.5px;color:var(--sub);margin-bottom:6px}
.stat-value{font-size:20px;font-family:'DM Mono',monospace;font-weight:500}
.stat-sub{font-size:10.5px;font-family:'DM Mono',monospace;margin-top:3px}

/* ── Cards ── */
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header h2{font-size:12.5px;font-weight:600}
.card-header p{font-size:10.5px;color:var(--sub)}
.card-body{padding:14px 16px}

/* ── Tables ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{font-size:9.5px;text-transform:uppercase;letter-spacing:.9px;color:var(--sub);padding:8px 12px;border-bottom:1px solid var(--border);text-align:right;font-weight:500;white-space:nowrap}
thead th:first-child,thead th:nth-child(2){text-align:left}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
tbody tr:hover{background:rgba(0,212,255,.04)}
tbody tr:last-child{border:none}
td{padding:9px 12px;text-align:right;font-size:11.5px}
td:first-child,td:nth-child(2){text-align:left}
td.mono{font-family:'DM Mono',monospace}
.sym{font-weight:600;font-size:13px}
.sym-name{font-size:10px;color:var(--sub)}

/* ── Trend badge ── */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;padding:2px 7px;border-radius:20px;border:1px solid;font-family:'DM Mono',monospace;white-space:nowrap}
.badge-up{color:var(--up);border-color:rgba(0,229,160,.35);background:rgba(0,229,160,.08)}
.badge-dn{color:var(--dn);border-color:rgba(255,77,106,.35);background:rgba(255,77,106,.08)}
.badge-sw{color:var(--warn);border-color:rgba(245,166,35,.35);background:rgba(245,166,35,.08)}

/* ── Sector bars ── */
.sector-bar-list{display:flex;flex-direction:column;gap:7px}
.sector-row{display:flex;align-items:center;gap:8px}
.sector-name{font-size:10.5px;width:82px;flex-shrink:0}
.sector-track{flex:1;height:5px;background:var(--muted);border-radius:3px;overflow:hidden}
.sector-fill{height:100%;border-radius:3px;transition:width .6s ease}
.sector-pct{font-size:10.5px;font-family:'DM Mono',monospace;width:48px;text-align:right}

/* ── Filter bar ── */
.filter-bar{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:9px 12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px}
.pill{padding:3px 11px;border-radius:20px;font-size:10.5px;cursor:pointer;border:1px solid var(--border);color:var(--sub);transition:all .13s}
.pill:hover{color:var(--text);border-color:var(--muted)}
.pill.active{color:var(--accent);border-color:rgba(0,212,255,.4);background:rgba(0,212,255,.08)}
.search-box{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:5px 10px;flex:1;min-width:150px}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:11.5px;width:100%}
.search-box input::placeholder{color:var(--sub)}
select.filter-select{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:11.5px;outline:none;cursor:pointer}

/* ── Heatmap ── */
.hm-table{width:100%;border-collapse:separate;border-spacing:3px}
.hm-table th{padding:6px 10px;color:var(--sub);font-weight:400;font-size:10px;text-align:center}
.hm-table th:first-child{text-align:left}
.hm-table td{padding:6px 10px;text-align:center;font-family:'DM Mono',monospace;font-size:10.5px;border-radius:5px;transition:all .3s}
.hm-table td:first-child{text-align:left;color:var(--sub);font-family:'Inter',sans-serif;font-size:11px}

/* ── Tabs ── */
.tabs{display:flex;gap:3px;margin-bottom:14px}
.tab{padding:6px 14px;border-radius:8px;font-size:11.5px;color:var(--sub);cursor:pointer;transition:all .13s;border:1px solid transparent}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);background:#0B1929;border-color:#1A3355}

/* ── Predictor sliders ── */
.slider-field{margin-bottom:13px}
.slider-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.slider-name{font-size:11.5px;color:var(--sub)}
.slider-val{font-size:11.5px;font-family:'DM Mono',monospace;color:var(--text)}
.slider-track{position:relative;height:4px;background:var(--muted);border-radius:2px}
.slider-fill{position:absolute;height:100%;border-radius:2px;background:linear-gradient(90deg,var(--a2),var(--accent));pointer-events:none;transition:width .12s}
input[type=range]{position:absolute;inset:0;width:100%;opacity:0;cursor:pointer;height:100%}

/* ── Prediction result ── */
.pred-box{border-radius:12px;padding:20px;text-align:center;border:1px solid var(--border);background:var(--panel);transition:all .4s}
.pred-box.up{background:rgba(0,229,160,.07);border-color:rgba(0,229,160,.3)}
.pred-box.dn{background:rgba(255,77,106,.07);border-color:rgba(255,77,106,.3)}
.pred-box.sw{background:rgba(245,166,35,.07);border-color:rgba(245,166,35,.3)}
.prob-bars{display:flex;flex-direction:column;gap:6px;margin-top:14px}
.prob-row{display:flex;align-items:center;gap:8px}
.prob-label{font-size:10.5px;color:var(--sub);width:62px;text-align:right}
.prob-track{flex:1;height:7px;background:var(--muted);border-radius:4px;overflow:hidden}
.prob-fill{height:100%;border-radius:4px;transition:width .6s ease}
.prob-num{font-size:10.5px;font-family:'DM Mono',monospace;width:36px}

/* ── Stock detail indicators ── */
.ind-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.ind-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px}
.ind-label{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
.ind-val{font-size:14px;font-family:'DM Mono',monospace;font-weight:500}
.ind-bar{height:2px;background:var(--muted);border-radius:2px;margin-top:5px;overflow:hidden}
.ind-fill{height:100%;border-radius:2px}

/* ── Chart containers ── */
.chart-wrap{position:relative;width:100%}

/* ── Utilities ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.up-color{color:var(--up)}.dn-color{color:var(--dn)}.warn-color{color:var(--warn)}
.link{color:var(--accent);font-size:11px;cursor:pointer}
.link:hover{text-decoration:underline}
.run-btn{width:100%;margin-top:12px;background:linear-gradient(135deg,var(--a2),var(--accent));color:#fff;font-size:13px;font-weight:600;padding:12px;border-radius:10px;border:none;cursor:pointer;letter-spacing:.3px;transition:opacity .18s}
.run-btn:hover{opacity:.88}
.back-btn{font-size:11.5px;color:var(--sub);cursor:pointer;display:inline-flex;align-items:center;gap:4px;margin-bottom:14px;transition:color .13s}
.back-btn:hover{color:var(--text)}

/* ── Sector Volume KPI Grid ────────────────────────────── */
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  margin-bottom:16px;
}
.kpi-card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px 16px;
  transition:transform .18s, border-color .18s;
  cursor:default;
}
.kpi-card:hover{
  transform:translateY(-2px);
}
@media(max-width:900px){
  .kpi-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:600px){
  .kpi-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body style="display:flex;flex-direction:column;height:100vh">

<!-- TICKER TAPE -->
<div class="tape">
  <div class="tape-badge"><div class="live-dot"></div>LIVE</div>
  <div class="tape-scroll"><div class="tape-inner" id="tape-inner">Loading…</div></div>
</div>

<!-- INDEX BAR -->
<div class="ibar" id="index-bar">
  <div class="idx"><span class="idx-l">Loading…</span></div>
</div>

<!-- SHELL -->
<div class="shell">
  <!-- SIDEBAR -->
  <aside class="sb" id="sidebar">
    <div class="sb-logo">
      <div class="sb-icon">📈</div>
      <span class="sb-name" id="logo-text">QuantEdge</span>
    </div>
    <nav id="nav-list"></nav>
    <div class="sb-toggle"><button id="toggle-btn" onclick="toggleSidebar()">‹</button></div>
  </aside>

  <!-- MAIN CONTENT -->
  <main id="main-content"></main>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const API = 'QUANTEDGE_API_URL';

// ─── STATE ───────────────────────────────────────────────────────────────────
const S = {
  page: 'dashboard',
  collapsed: false,
  sector: 'All',
  search: '',
  sortBy: 'volume',
  sortDir: 'desc',
  predValues: {},
  predResult: null,
  selectedTicker: null,
  analyticsTab: 'sector',
  cache: {},
};

// ─── FEATURE META ─────────────────────────────────────────────────────────────
const FM = [
  {k:'rsi_14',       l:'RSI (14)',         mn:0,   mx:100,  d:58.3,  dp:1},
  {k:'macd',         l:'MACD',             mn:-10, mx:10,   d:1.24,  dp:3},
  {k:'macd_histogram',l:'MACD Histogram',  mn:-5,  mx:5,    d:0.45,  dp:3},
  {k:'bb_width',     l:'BB Width',         mn:0,   mx:0.5,  d:0.12,  dp:3},
  {k:'volume_ratio', l:'Volume Ratio',     mn:0,   mx:5,    d:1.15,  dp:2},
  {k:'momentum_10',  l:'Momentum 10d',     mn:-20, mx:20,   d:3.2,   dp:1},
  {k:'momentum_20',  l:'Momentum 20d',     mn:-30, mx:30,   d:5.1,   dp:1},
  {k:'price_to_sma_50',l:'Price / SMA50',  mn:0.5, mx:2,    d:1.03,  dp:3},
  {k:'volatility_20',l:'Volatility 20d',   mn:0,   mx:0.1,  d:0.018, dp:4},
  {k:'atr_14',       l:'ATR (14)',          mn:0,   mx:20,   d:2.4,   dp:2},
  {k:'daily_return', l:'Daily Return %',   mn:-10, mx:10,   d:0.52,  dp:2},
  {k:'vix_close',    l:'VIX',              mn:5,   mx:80,   d:18.5,  dp:1},
];
FM.forEach(f => S.predValues[f.k] = f.d);

const PRESETS = {
  'Strong Bull': {rsi_14:72,macd:2.8,macd_histogram:1.2,bb_width:0.18,volume_ratio:1.85,momentum_10:8.5,momentum_20:12,price_to_sma_50:1.08,volatility_20:0.022,atr_14:4.2,daily_return:1.8,vix_close:14.2},
  'Bear Signal': {rsi_14:28,macd:-2.1,macd_histogram:-0.9,bb_width:0.24,volume_ratio:2.1,momentum_10:-7.2,momentum_20:-11.5,price_to_sma_50:0.92,volatility_20:0.038,atr_14:5.8,daily_return:-2.3,vix_close:32.5},
  'Sideways':    {rsi_14:50,macd:0.1,macd_histogram:0.02,bb_width:0.08,volume_ratio:0.9,momentum_10:0.4,momentum_20:0.8,price_to_sma_50:1.0,volatility_20:0.012,atr_14:1.8,daily_return:0.1,vix_close:20},
  'Recovery':    {rsi_14:55,macd:0.9,macd_histogram:0.3,bb_width:0.15,volume_ratio:1.4,momentum_10:4.1,momentum_20:3.2,price_to_sma_50:1.02,volatility_20:0.025,atr_14:3.5,daily_return:0.9,vix_close:22},
};

const PAGES = [
  {id:'dashboard', icon:'▦', label:'Dashboard'},
  {id:'markets',   icon:'▲', label:'Markets'},
  {id:'analytics', icon:'◈', label:'Analytics'},
  {id:'predictor', icon:'◉', label:'ML Predictor'},
];

const SECTOR_COLORS = {
  Technology:'#00D4FF', Finance:'#7B61FF', Healthcare:'#00E5A0',
  Consumer:'#F5A623', Energy:'#FF4D6A',
};

const FI_DATA = {
  rsi_14:0.142, daily_return:0.131, macd:0.118, momentum_10:0.104,
  momentum_20:0.099, price_to_sma_50:0.087, volatility_20:0.081,
  vix_close:0.077, bb_width:0.062, volume_ratio:0.055,
  macd_histogram:0.030, atr_14:0.014,
};

// ─── CHART REGISTRY ──────────────────────────────────────────────────────────
let _charts = [];
function destroyCharts() { _charts.forEach(c => { try { c.destroy(); } catch(e){} }); _charts = []; }
function mkChart(id, cfg) {
  const el = document.getElementById(id);
  if (!el) return null;
  const c = new Chart(el, cfg);
  _charts.push(c);
  return c;
}

// --- API ---
async function apiFetch(path, opts = {}) {
  try {
    const r = await fetch(API + path, opts);
    if (!r.ok) {
      console.error('API HTTP error:', r.status, 'for', path);
      showApiError(r.status);
      return null;
    }
    return await r.json();
  } catch (e) {
    console.error('API fetch failed for', path, ':', e.message);
    showApiError('Network error - check BACKEND_URL');
    return null;
  }
}

let _apiErrorShown = false;
function showApiError(detail) {
  if (_apiErrorShown) return;
  _apiErrorShown = true;
  const mc = document.getElementById('main-content');
  if (!mc) return;
  mc.innerHTML = `
    <div style="padding:40px;text-align:center;color:#8899BB">
      <div style="font-size:48px;margin-bottom:16px">⚡</div>
      <h2 style="color:#E8EBF0;margin-bottom:8px">Cannot reach the API</h2>
      <p style="margin-bottom:8px">Make sure the <b style="color:#00D4FF">BACKEND_URL</b> variable is set correctly in Railway.</p>
      <p style="font-family:'DM Mono',monospace;font-size:12px;color:#FF4D6A;margin-bottom:20px">${detail}</p>
      <p style="font-size:12px">Go to Railway → <b>quantedge-ui</b> service → Variables tab.<br>
      Confirm <b style="color:#00D4FF">BACKEND_URL</b> = <b style="color:#00E5A0">https://your-api.up.railway.app</b></p>
      <button onclick="location.reload()" style="margin-top:20px;padding:10px 24px;background:linear-gradient(135deg,#7B61FF,#00D4FF);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px">Retry</button>
    </div>`;
}


async function apiPost(path, body) {
  return apiFetch(path, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const fmt = (v, d = 2) => typeof v === 'number' ? v.toFixed(d) : '—';
const pct = (v, d = 2) => (v >= 0 ? '+' : '') + fmt(v, d) + '%';
const col = v => v >= 0 ? 'var(--up)' : 'var(--dn)';
const updown = (v, d = 2) => `<span class="mono" style="color:${col(v)}">${pct(v, d)}</span>`;

function trendBadge(t) {
  const map = {Uptrend:{cl:'badge-up',ic:'▲'}, Downtrend:{cl:'badge-dn',ic:'▼'}, Sideways:{cl:'badge-sw',ic:'—'}};
  const m = map[t] || {cl:'badge-sw',ic:'—'};
  return `<span class="badge ${m.cl}">${m.ic} ${t || '—'}</span>`;
}

function genPrices(base, up, n = 60) {
  const r = [base];
  for (let i = 1; i < n; i++) {
    r.push(r[r.length-1] * (1 + (Math.random() - 0.5) * 0.04 * (up ? 1.15 : 0.85)));
  }
  return r;
}

// ─── TICKER TAPE ─────────────────────────────────────────────────────────────
async function initTape() {
  const data = await apiFetch('/api/stocks?limit=20');
  if (!data?.stocks) return;
  const stocks = data.stocks;
  const items = [...stocks, ...stocks].map(s =>
    `<span class="tape-item">
      <span style="color:var(--sub)">${s.ticker}</span>
      <span>$${fmt(s.price)}</span>
      <span style="color:${col(s.change_pct)}">${s.change_pct >= 0 ? '▲' : '▼'}${fmt(Math.abs(s.change_pct))}%</span>
    </span>`
  ).join('');

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
function renderNav() {
  const c = S.collapsed;
  document.getElementById('logo-text').style.display = c ? 'none' : '';
  document.getElementById('toggle-btn').textContent = c ? '›' : '‹';
  document.getElementById('sidebar').classList.toggle('col', c);
  document.getElementById('nav-list').innerHTML = PAGES.map(p =>
    `<div class="nav-item${S.page === p.id ? ' active' : ''}" onclick="navigate('${p.id}')">
      <span class="nav-icon">${p.icon}</span>
      ${c ? '' : `<span>${p.label}</span>`}
    </div>`
  ).join('');
}

function toggleSidebar() { S.collapsed = !S.collapsed; renderNav(); }

function navigate(page) {
  S.page = page;
  renderNav();
  renderPage();
}

function goToDetail(ticker) {
  S.page = 'detail';
  S.selectedTicker = ticker;
  renderNav();
  renderPage();
}

// ─── PAGE ROUTER ─────────────────────────────────────────────────────────────
function renderPage() {
  destroyCharts();
  const mc = document.getElementById('main-content');
  mc.innerHTML = '<div style="padding:40px;color:var(--sub);text-align:center">Loading…</div>';
  const pages = {
    dashboard: renderDashboard,
    markets:   renderMarkets,
    analytics: renderAnalytics,
    predictor: renderPredictor,
    detail:    renderDetail,
  };
  (pages[S.page] || renderDashboard)();
}

async function renderDashboard() {
  const [ov, stocksData, sectorData, topData, volKpi] = await Promise.all([
    S.cache.overview ? Promise.resolve(S.cache.overview) : apiFetch('/api/market/overview'),
    apiFetch('/api/stocks?sort_by=volume&limit=10'),
    apiFetch('/api/analytics/sector-performance'),
    apiFetch('/api/analytics/top-performers'),
    apiFetch('/api/analytics/sector-volume-kpi'),
  ]);
  if (ov) S.cache.overview = ov;

  const stocks  = stocksData?.stocks ?? [];
  const sectors = sectorData?.data   ?? [];
  const topList = topData?.top?.slice(0, 5) ?? [];
  const volData = volKpi?.data ?? [];
  const maxAbs  = Math.max(...sectors.map(s => Math.abs(s.avg_daily_return)), 0.001);

  // Sector colors matching the notebook pie chart
  const SCOL = {
    Technology: '#00D4FF', Finance: '#7B61FF', Healthcare: '#00E5A0',
    Consumer: '#F5A623', Energy: '#FF4D6A',
  };

  // Format volume: 22,800,000 -> "22.8M"  or  1,200,000,000 -> "1.2B"
  function fmtVol(v) {
    if (v >= 1e9) return (v / 1e9).toFixed(1) + 'B';
    if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
    if (v >= 1e3) return (v / 1e3).toFixed(1) + 'K';
    return v.toString();
  }

  // Rank medal for top sector
  const medals = ['', '#F5A623', '#8899BB', '#CD7F32', '', ''];

  // Build sector volume KPI cards
  const kpiCards = volData.map(d => {
    const color   = SCOL[d.sector] || '#8899BB';
    const isBest  = d.rank === 1;
    const barW    = volData[0] ? Math.round(d.avg_volume / volData[0].avg_volume * 100) : 100;
    const medal   = medals[d.rank] || '';
    return `
      <div class="kpi-card" style="border-color:${isBest ? color + '55' : 'var(--border)'}; background:${isBest ? color + '08' : 'var(--panel)'}">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <span style="font-size:9.5px;text-transform:uppercase;letter-spacing:1.5px;color:${color};font-weight:600">${d.sector}</span>
          <span style="font-size:10px;font-family:'DM Mono',monospace;color:var(--sub)">#${d.rank}${isBest ? ' top' : ''}</span>
        </div>
        <div style="font-size:22px;font-family:'DM Mono',monospace;font-weight:500;color:var(--text);margin-bottom:2px">${fmtVol(d.avg_volume)}</div>
        <div style="font-size:10px;color:var(--sub);margin-bottom:10px">avg daily vol &middot; <span style="color:${color}">${d.pct}% of total</span></div>
        <div style="height:4px;background:var(--muted);border-radius:2px;overflow:hidden">
          <div style="height:100%;border-radius:2px;background:${color};width:${barW}%;transition:width .6s ease"></div>
        </div>
        <div style="font-size:10px;color:var(--sub);margin-top:6px">Total: <span style="font-family:'DM Mono',monospace;color:var(--text)">${fmtVol(d.total_volume)}</span></div>
      </div>`;
  }).join('');

  const stockRows = stocks.map((s, i) => `
    <tr onclick="goToDetail('${s.ticker}')">
      <td class="mono" style="color:var(--sub)">${i+1}</td>
      <td><div class="sym">${s.ticker}</div><div class="sym-name">${s.company_name}</div></td>
      <td class="mono">$${fmt(s.price)}</td>
      <td style="color:${col(s.change_pct)};font-family:'DM Mono',monospace">${pct(s.change_pct)}</td>
      <td class="mono" style="color:var(--sub)">${(s.volume/1e6).toFixed(1)}M</td>
      <td>${trendBadge(s.trend)}</td>
    </tr>`
  ).join('');

  const sectorBars = sectors.map(s => {
    const pctW = (Math.abs(s.avg_daily_return) / maxAbs * 100).toFixed(1);

      <span class="sector-name" style="color:${sColor}">${s.sector}</span>
      <div class="sector-track"><div class="sector-fill" style="width:${pctW}%;background:${sColor}"></div></div>
      <span class="sector-pct" style="color:${col(s.avg_daily_return)}">${pct(s.avg_daily_return * 100, 3)}</span>
    </div>`;
  }).join('');

  const topRows = topList.map(s => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:11.5px;font-weight:600">${s.ticker}</span>
      <span style="font-size:10px;color:var(--sub)">${s.sector}</span>
      <span style="font-size:11px;font-family:'DM Mono',monospace;color:${col(s.avg_daily_return)}">${pct(s.avg_daily_return * 100, 3)}</span>
    </div>`
  ).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="ph">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><h1>Market Dashboard</h1><p>Real-time overview &middot; ML-powered stock analytics</p></div>
        <div style="display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:4px 12px">
          <div class="live-dot"></div>

          <span style="font-size:11px;font-weight:600;color:var(--accent)">${ov?.market_regime ?? '&mdash;'}</span>
        </div>
      </div>
    </div>

    <!-- Market index stat cards -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">S&P 500</div>
        <div class="stat-value">${ov?.sp500?.value?.toLocaleString() ?? '&mdash;'}</div>
        <div class="stat-sub" style="color:${col(ov?.sp500?.change_pct ?? 0)}">${pct(ov?.sp500?.change_pct ?? 0)} today</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">NASDAQ</div>
        <div class="stat-value">${ov?.nasdaq?.value?.toLocaleString() ?? '&mdash;'}</div>
        <div class="stat-sub" style="color:${col(ov?.nasdaq?.change_pct ?? 0)}">${pct(ov?.nasdaq?.change_pct ?? 0)} today</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">VIX Fear Index</div>
        <div class="stat-value">${ov?.vix?.value ?? '&mdash;'}</div>
        <div class="stat-sub" style="color:var(--warn)">${ov?.vix?.label ?? ''}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">10Y Treasury</div>
        <div class="stat-value">${ov?.treasury_10y ?? '&mdash;'}%</div>
        <div class="stat-sub" style="color:var(--sub)">Yield</div>
      </div>
    </div>

    <!-- Sector Volume KPI Cards -->
    <div style="margin-bottom:6px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <span style="font-size:12.5px;font-weight:600">Volume by Sector</span>
        <span style="font-size:11px;color:var(--sub);margin-left:10px">Average daily trading volume &middot; from notebook Trading Volume Patterns analysis</span>
      </div>
      <span style="font-size:10px;color:var(--sub)">Energy leads &rsaquo; Healthcare lowest</span>
    </div>
    <div class="kpi-grid">${kpiCards || '<div style="color:var(--sub);padding:20px">Loading volume data&hellip;</div>'}</div>

    <!-- Most Active + Sector Returns -->
    <div style="display:grid;grid-template-columns:1fr 310px;gap:12px;margin-top:4px">
      <div class="card">
        <div class="card-header">
          <h2>Most Active</h2>

        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>#</th><th>Symbol</th><th>Price</th><th>Chg %</th><th>Volume</th><th>Trend</th></tr></thead>

      responsive: true, maintainAspectRatio: false,

      scales: {
        x: {ticks:{color:'#8899BB',font:{size:11}}, grid:{display:false}},

      scales: {
        x: {ticks:{color:'#8899BB',font:{size:10}, callback:v=>`${(v*100).toFixed(2)}%`}, grid:{color:'#1E2433'}},

      },

    mkChart('botChart',{type:'bar',data:{labels:bot.map(s=>s.company_name),datasets:[{data:bot.map(s=>s.avg_daily_return),backgroundColor:'#FF4D6A',borderRadius:4,borderSkipped:false}]},options:hOpts('#FF4D6A')});

// ─── PREDICTOR ───────────────────────────────────────────────────────────────
async function renderPredictor() {
  const modelInfo = await apiFetch('/api/model/info');
  const r = S.predResult;

  const predStyleMap = {
    Uptrend:   {c:'var(--up)',  cls:'up', icon:'▲'},
    Downtrend: {c:'var(--dn)',  cls:'dn', icon:'▼'},
    Sideways:  {c:'var(--warn)',cls:'sw', icon:'—'},
  };
  const ps = r ? predStyleMap[r.prediction] : null;

  const sliders = FM.map(f => {
    const v = S.predValues[f.k];
    const pctW = ((v - f.mn) / (f.mx - f.mn) * 100).toFixed(1);
    return `<div class="slider-field">
      <div class="slider-label">
        <span class="slider-name">${f.l}</span>
        <span class="slider-val" id="sv_${f.k}">${v.toFixed(f.dp)}</span>
      </div>
      <div class="slider-track">
        <div class="slider-fill" id="sf_${f.k}" style="width:${pctW}%"></div>
        <input type="range" min="${f.mn}" max="${f.mx}" step="${Math.pow(10,-f.dp)}" value="${v}"
          oninput="updateSlider('${f.k}', parseFloat(this.value))"/>
      </div>
    </div>`;
  }).join('');

  const presets = Object.keys(PRESETS).map(p =>
    `<div class="pill" onclick="applyPreset('${p}')">${p}</div>`
  ).join('');

  const fiRows = Object.entries(FI_DATA)
    .sort((a,b) => b[1]-a[1])
    .map(([k,v]) => {
      const label = FM.find(f => f.k === k)?.l || k;
      return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:10px;color:var(--sub);width:100px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${label}</span>
        <div style="flex:1;height:4px;background:var(--muted);border-radius:2px;overflow:hidden">
          <div style="height:100%;background:linear-gradient(90deg,var(--a2),var(--accent));width:${(v/0.142*100).toFixed(0)}%"></div>
        </div>
        <span style="font-size:10px;font-family:'DM Mono',monospace;color:var(--sub);width:32px;text-align:right">${(v*100).toFixed(1)}%</span>
      </div>`;
    }).join('');

  const metrics = modelInfo?.metrics;

  document.getElementById('main-content').innerHTML = `
    <div class="ph">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div><h1>ML Trend Predictor</h1><p>Enter 12 technical indicators → get Uptrend / Sideways / Downtrend</p></div>
        ${modelInfo ? `<div style="display:flex;gap:12px;font-size:11px">
          <div style="background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:5px 12px">
            <span style="color:var(--sub)">Model </span><span style="color:var(--accent);font-family:'DM Mono',monospace">${modelInfo.model_type}</span>
          </div>
          <div style="background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:5px 12px">
            <span style="color:var(--sub)">Accuracy </span><span style="color:var(--up);font-family:'DM Mono',monospace">${((metrics?.accuracy??0)*100).toFixed(1)}%</span>
          </div>
        </div>` : ''}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 330px;gap:14px">
      <div>
        <div class="card" style="margin-bottom:12px">
          <div class="card-header"><h2>Quick Presets</h2></div>
          <div class="card-body" style="display:flex;gap:8px;flex-wrap:wrap">${presets}</div>
        </div>
        <div class="card">
          <div class="card-header"><h2>Technical Indicators</h2><p>Drag sliders to set values</p></div>
          <div class="card-body">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 24px">${sliders}</div>
            <button class="run-btn" onclick="runPrediction()">⚡ Run Prediction</button>
          </div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="pred-box${ps ? ' '+ps.cls : ''}">
          ${r && ps ? `
            <div style="font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:1.5px">Prediction</div>
            <div style="font-size:32px;margin:6px 0">${ps.icon}</div>
            <div style="font-size:24px;font-weight:700;font-family:'DM Mono',monospace;color:${ps.c}">${r.prediction.toUpperCase()}</div>
            <div style="font-size:11px;color:var(--sub);margin-top:4px">Confidence: <span style="color:${ps.c};font-family:'DM Mono',monospace">${(r.confidence*100).toFixed(1)}%</span></div>
            <div style="font-size:10px;color:var(--sub);margin-top:2px">${r.model}</div>
            <div class="prob-bars">
              ${Object.entries(r.probabilities).map(([cls,prob]) => {
                const pColor = cls==='Uptrend'?'var(--up)':cls==='Downtrend'?'var(--dn)':'var(--warn)';
                return `<div class="prob-row">
                  <span class="prob-label">${cls}</span>
                  <div class="prob-track"><div class="prob-fill" style="width:${(prob*100).toFixed(1)}%;background:${pColor}"></div></div>
                  <span class="prob-num" style="color:${pColor}">${(prob*100).toFixed(1)}%</span>
                </div>`;
              }).join('')}
            </div>`
          : `<div style="padding:32px 0;color:var(--sub)">
              <div style="font-size:32px;opacity:.2;margin-bottom:10px">◉</div>
              <div style="font-size:12px">Set indicators and run prediction</div>
            </div>`}
        </div>
        <div class="card">
          <div class="card-header"><h2>Feature Importance</h2><p>RandomForest model</p></div>
          <div class="card-body">${fiRows}</div>
        </div>
        ${metrics ? `
        <div class="card">
          <div class="card-header"><h2>Model Metrics</h2></div>
          <div class="card-body">
            ${['Uptrend','Sideways','Downtrend'].map(cls => {
              const m = metrics[cls];
              const mc = cls==='Uptrend'?'var(--up)':cls==='Downtrend'?'var(--dn)':'var(--warn)';
              return `<div style="margin-bottom:9px">
                <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
                  <span style="color:${mc}">${cls}</span>
                  <span style="color:var(--sub);font-family:'DM Mono',monospace">F1: ${m.f1.toFixed(2)}</span>
                </div>
                <div style="height:3px;background:var(--muted);border-radius:2px">
                  <div style="height:100%;background:${mc};width:${(m.f1*100).toFixed(0)}%;border-radius:2px"></div>
                </div>
              </div>`;
            }).join('')}
            <div style="display:flex;justify-content:space-between;font-size:11.5px;padding-top:9px;border-top:1px solid var(--border)">
              <span style="color:var(--sub)">Overall Accuracy</span>
              <span style="color:var(--up);font-family:'DM Mono',monospace">${((metrics.accuracy??0)*100).toFixed(1)}%</span>
            </div>
          </div>
        </div>` : ''}
      </div>
    </div>`;
}

function updateSlider(key, val) {
  S.predValues[key] = val;
  const f = FM.find(x => x.k === key);
  const elV = document.getElementById(`sv_${key}`);
  const elF = document.getElementById(`sf_${key}`);
  if (elV) elV.textContent = val.toFixed(f?.dp ?? 2);
  if (elF && f) elF.style.width = ((val - f.mn) / (f.mx - f.mn) * 100).toFixed(1) + '%';
}

function applyPreset(name) {
  Object.assign(S.predValues, PRESETS[name]);
  S.predResult = null;
  renderPredictor();
}

async function runPrediction() {
  const btn = document.querySelector('.run-btn');
  if (btn) { btn.textContent = '⏳ Predicting…'; btn.disabled = true; }
  const result = await apiPost('/api/predict', S.predValues);
  S.predResult = result;
  renderPredictor();
}

// ─── STOCK DETAIL ─────────────────────────────────────────────────────────────
async function renderDetail() {
  const ticker = S.selectedTicker;
  const [stock, indicators] = await Promise.all([
    apiFetch(`/api/stocks/${ticker}`),
    apiFetch(`/api/stocks/${ticker}/indicators`),
  ]);

  if (!stock) {
    document.getElementById('main-content').innerHTML = `
      <span class="back-btn" onclick="navigate('markets')">← Back to Markets</span>
      <div style="padding:40px;color:var(--dn);text-align:center">Stock not found: ${ticker}</div>`;
    return;
  }

  const isUp = stock.change_pct >= 0;
  const tColor = stock.trend === 'Uptrend' ? 'var(--up)' : stock.trend === 'Downtrend' ? 'var(--dn)' : 'var(--warn)';
  const prices = stock.history ?? genPrices(stock.price * 0.85, isUp, 90);
  const dates  = stock.dates ?? Array.from({length:prices.length}, (_,i) => {
    const d = new Date(); d.setDate(d.getDate() - prices.length + 1 + i);
    return `${d.getMonth()+1}/${d.getDate()}`;
  });

  const statItems = [
    ['Volume',   `${(stock.volume/1e6).toFixed(1)}M`, ''],
    ['Mkt Cap',  `$${(stock.market_cap/1e9).toFixed(1)}B`, ''],
    ['P/E',       stock.pe_ratio, ''],
    ['52W High', `$${stock['52w_high']}`, 'var(--up)'],
    ['52W Low',  `$${stock['52w_low']}`,  'var(--dn)'],
    ['Regime',    stock.regime, 'var(--accent)'],
  ];

  const indItems = [
    {l:'RSI (14)',   v:indicators?.rsi_14??0,          mn:0,  mx:100, c:'var(--accent)'},
    {l:'MACD',       v:indicators?.macd??0,             mn:-5, mx:5,   c:'var(--up)'},
    {l:'BB Width',   v:indicators?.bb_width??0,         mn:0,  mx:.3,  c:'var(--a2)'},
    {l:'Vol Ratio',  v:indicators?.volume_ratio??0,     mn:0,  mx:3,   c:isUp?'var(--up)':'var(--dn)'},
    {l:'Momentum',   v:indicators?.momentum_10??0,      mn:-15,mx:15,  c:'var(--warn)'},
    {l:'ATR (14)',   v:indicators?.atr_14??0,           mn:0,  mx:10,  c:'var(--sub)'},
    {l:'Volatility', v:indicators?.volatility_20??0,    mn:0,  mx:.05, c:'var(--accent)'},
    {l:'P/SMA50',    v:indicators?.price_to_sma_50??0,  mn:.8, mx:1.2, c:'var(--up)'},
  ];

  document.getElementById('main-content').innerHTML = `
    <span class="back-btn" onclick="navigate('markets')">← Back to Markets</span>
    <div class="card" style="margin-bottom:12px">
      <div class="card-body">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px">
          <div style="display:flex;align-items:center;gap:12px">
            <div style="width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,rgba(0,212,255,.18),rgba(123,97,255,.18));border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--accent)">${ticker.slice(0,2)}</div>
            <div>
              <div style="font-size:18px;font-weight:600">${stock.company_name}</div>
              <div style="font-size:11.5px;color:var(--sub)">${ticker} · ${stock.sector}</div>
            </div>
          </div>
          <div style="text-align:right">
            <div style="font-size:28px;font-family:'DM Mono',monospace;font-weight:600">$${fmt(stock.price)}</div>
            <div style="font-size:13px;font-family:'DM Mono',monospace;color:${col(stock.change_pct)}">${pct(stock.change_pct)} (${stock.change >= 0 ? '+' : ''}${fmt(stock.change)})</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px">
          ${statItems.map(([l,v,c]) => `
            <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 10px">
              <div style="font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px">${l}</div>
              <div style="font-size:13px;font-family:'DM Mono',monospace;font-weight:500${c?`;color:${c}`:''}">${v}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>
    <div class="card" style="margin-bottom:12px">
      <div class="card-header"><h2>${ticker} — Price History</h2><span style="font-size:10.5px;color:var(--sub)">Purple dashed = SMA 20</span></div>
      <div class="card-body"><div class="chart-wrap" style="height:250px"><canvas id="priceChart"></canvas></div></div>
    </div>
    <div class="card" style="margin-bottom:12px">
      <div class="card-header"><h2>Technical Indicators</h2></div>
      <div class="card-body">
        <div class="ind-grid">
          ${indItems.map(it => {
            const pctW = Math.min(100, Math.max(0, (it.v - it.mn) / (it.mx - it.mn) * 100));
            return `<div class="ind-card">
              <div class="ind-label">${it.l}</div>
              <div class="ind-val" style="color:${it.c}">${it.v.toFixed(it.l.includes('Vol')&&!it.l.includes('Ratio')?4:2)}</div>
              <div class="ind-bar"><div class="ind-fill" style="width:${pctW.toFixed(0)}%;background:${it.c}"></div></div>
            </div>`;
          }).join('')}
        </div>
        <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
          <p style="font-size:11.5px;color:var(--sub)">Use current indicators in the ML Predictor</p>
          <div class="pill active" onclick="navigate('predictor')" style="cursor:pointer">Open Predictor ›</div>
        </div>
      </div>
    </div>`;

  // Draw price chart
  const sma20 = prices.map((_, i) =>
    i >= 19 ? prices.slice(i-19, i+1).reduce((a,b)=>a+b,0)/20 : null
  );
  mkChart('priceChart', {
    type: 'line',
    data: {
      labels: dates,
      datasets: [
        {
          label: 'Price', data: prices,
          borderColor: isUp ? '#00E5A0' : '#FF4D6A', borderWidth: 2,
          pointRadius: 0, fill: true,
          backgroundColor: isUp ? 'rgba(0,229,160,.07)' : 'rgba(255,77,106,.07)',
        },
        {
          label: 'SMA 20', data: sma20,
          borderColor: '#7B61FF', borderWidth: 1.5,
          pointRadius: 0, fill: false, borderDash: [4,3], spanGaps: true,
        },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: {mode:'index', intersect:false},
      plugins: {
        legend: {display: false},
        tooltip: {
          backgroundColor: '#111620', borderColor: '#1E2433', borderWidth: 1,
          titleColor: '#8899BB', bodyColor: '#E8EBF0',
          callbacks: {label: v => `${v.dataset.label}: $${fmt(v.raw)}`},
        },
      },
      scales: {
        x: {ticks:{color:'#8899BB',font:{size:10},maxTicksLimit:8}, grid:{display:false}},
        y: {ticks:{color:'#8899BB',font:{size:10},callback:v=>`$${v.toFixed(0)}`}, grid:{color:'#1E2433'}},
      },
    },
  });
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
async function boot() {
  renderNav();
  await Promise.all([initTape(), initIndexBar()]);
  renderPage();
  // Refresh ticker + index bar every 30s
  setInterval(initTape, 30_000);
  setInterval(initIndexBar, 60_000);
}

boot();
</script>
</body>
</html>
